linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - unparam
    - goconst
    - gocyclo
    - errname
    - errorlint
    - copyloopvar
    - intrange
    - nilerr
    - reassign
    - bodyclose

linters-settings:
  errcheck:
    exclude-functions:
      # Standard Go pattern: deferred Rollback after Commit
      - (*database/sql.Tx).Rollback
    check-type-assertions: true
  gocyclo:
    min-complexity: 25
  goconst:
    min-len: 3
    min-occurrences: 3
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

issues:
  exclude-dirs:
    - e2e
  exclude-rules:
    # Tests: unchecked errors in HTTP handlers and helpers are fine
    - path: _test\.go
      linters:
        - errcheck
        - goconst
        - gocyclo
        - unparam
    # Bubble Tea convention: message types use XxxMsg not XxxError
    - linters:
        - errname
      text: "ErrMsg"
    # Handler methods keep consistent (bool, tea.Cmd) signature for key routing
    - path: handlers_
      linters:
        - unparam
