[tools]
go = "latest"

[tasks.build]
run = "go build -o jirascrap.out ."
description = "Build the jirascrap binary"

[tasks.run]
run = "go run ."
description = "Run without building"

[tasks.clean]
run = "rm -f jirascrap.out"
description = "Remove build artifacts"

[tasks.e2e]
run = "bash e2e/run.sh"
description = "Run e2e demo tape (requires vhs)"

[env]
JIRA_BASE_URL = { required = "Set your organization's Jira Base URL" }
JIRA_EMAIL = { required = "Set your Email used for Jira" }
JIRA_API_TOKEN = { required = "Get your API token from Atlassian Settings" }
JIRA_JQL = "assignee = currentUser() AND statusCategory != Done AND status != 'TO DESCRIBE' ORDER BY status DESC"

JIRA_DB_PATH = { required = "Set your SQLite path" }
