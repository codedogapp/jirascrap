version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/store/sqlcdb"
        overrides:
          - column: "tickets.epic_id"
            go_type:
              type: "string"
              pointer: true
